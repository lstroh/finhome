<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <h1>Finance Tracker</h1>
    <p class="subtitle">Local dashboard — data never leaves this machine</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-view="overview" role="tab" aria-selected="true">Overview</button>
    <button class="tab" data-view="trends" role="tab" aria-selected="false">Trends</button>
    <button class="tab" data-view="subscriptions" role="tab" aria-selected="false">Subscriptions</button>
    <button class="tab" data-view="search" role="tab" aria-selected="false">Search</button>
    <button class="tab" data-view="uncategorised" role="tab" aria-selected="false">Uncategorised</button>
  </nav>

  <main id="app">
    <div id="loading" class="loading">Loading…</div>
    <div id="error" class="error hidden" role="alert"></div>
    <div id="empty" class="empty hidden"></div>

    <section id="view-overview" class="view hidden">
      <div class="toolbar">
        <label for="month-select">Month</label>
        <select id="month-select"></select>
      </div>
      <div id="uncat-banner" class="banner hidden"></div>
      <div id="summary-cards" class="cards"></div>
      <h2>Spending by category</h2>
      <p class="muted category-hint">Click a category to see individual transactions. Change a category in the drill-down to update all matching descriptions.</p>
      <div id="category-table" class="table-wrap"></div>
      <div id="drilldown-panel" class="drilldown hidden" role="region" aria-label="Category transactions"></div>
      <h2>50/30/20 benchmark</h2>
      <div id="benchmark" class="benchmark"></div>
      <h2>Top merchants</h2>
      <div id="merchants" class="table-wrap"></div>
    </section>

    <section id="view-trends" class="view hidden">
      <div id="trends-content"></div>
    </section>

    <section id="view-subscriptions" class="view hidden">
      <div id="subscriptions-content"></div>
    </section>

    <section id="view-search" class="view hidden">
      <div class="toolbar search-toolbar">
        <label for="search-query">Search</label>
        <input type="search" id="search-query" class="search-input" placeholder="Merchant or description, e.g. BROMCOM" maxlength="200">
        <label for="search-scope">Scope</label>
        <select id="search-scope">
          <option value="month">Month</option>
          <option value="year">Year</option>
          <option value="all">All data</option>
        </select>
        <label for="search-month" id="search-month-label">Month</label>
        <select id="search-month"></select>
        <label for="search-year" id="search-year-label" class="hidden">Year</label>
        <select id="search-year" class="hidden"></select>
        <button type="button" id="search-submit" class="search-submit">Search</button>
      </div>
      <div id="search-results"></div>
    </section>

    <section id="view-uncategorised" class="view hidden">
      <div id="uncategorised-content"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
